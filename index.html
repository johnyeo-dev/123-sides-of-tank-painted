<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cube Painting Teaching Tool</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { margin:0; font-family:Arial; background:#f8fafc; color:#111;}
.container { display:flex; flex-direction:column; height:100vh;}
#top { height:55%; position:relative; background:white;}
#bottom { height:45%; padding:20px; background:#eef2ff;}
.controls { position:absolute; top:10px; left:10px; z-index:10;}
button { margin:5px; padding:10px; border:none; border-radius:6px; cursor:pointer; font-weight:bold;}
.b1 {background:#3b82f6; color:white;}
.b2 {background:#facc15;}
.b3 {background:#ef4444; color:white;}
.b4 {background:#94a3b8;}
canvas {display:block;}
.bar {height:30px; margin:8px 0; display:flex; align-items:center; padding-left:10px; border-radius:6px;}
.blue {background:#3b82f6; color:white;}
.yellow {background:#facc15;}
.red {background:#ef4444; color:white;}
.controls2 {position:absolute; top:10px; right:10px;}
</style>
</head>
<body>

<div class="container">
<div id="top">

<div class="controls">
<button class="b1" onclick="highlight(1)">1 side</button>
<button class="b2" onclick="highlight(2)">2 sides</button>
<button class="b3" onclick="highlight(3)">3 sides</button>
<button class="b4" onclick="resetColors()">Reset</button>
</div>

<div class="controls2">
<button onclick="zoomIn()">+</button>
<button onclick="zoomOut()">−</button>
<button onclick="rotateLeft()">⟲</button>
<button onclick="rotateRight()">⟳</button>
</div>

</div>

<div id="bottom">
<h3>Exam Question</h3>
<p>Teresa had a rectangular box measuring <b>80 cm × 24 cm × 63 cm</b>.<br>
a) What is the maximum number of 4-cm cubes she can pack?<br>
b) How many cubes touch only the base?</p>

<h3>Real Question Mapping</h3>
<div id="info">Click a button to begin</div>
<div id="bars"></div>
</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.134/examples/js/controls/OrbitControls.js"></script>

<script>
let scene=new THREE.Scene();
scene.background=new THREE.Color(0xffffff);

let camera=new THREE.PerspectiveCamera(75,window.innerWidth/(window.innerHeight*0.55),0.1,1000);
let renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight*0.55);
document.getElementById("top").appendChild(renderer.domElement);

let controls=new THREE.OrbitControls(camera,renderer.domElement);
camera.position.set(10,10,10);

let light=new THREE.AmbientLight(0xffffff,1);
scene.add(light);

let cubes=[];
let L=6,W=5,H=4,spacing=1.2;

for(let x=0;x<L;x++){
for(let y=0;y<W;y++){
for(let z=0;z<H;z++){

let geo=new THREE.BoxGeometry(1,1,1);
let edges=new THREE.EdgesGeometry(geo);
let line=new THREE.LineSegments(edges,new THREE.LineBasicMaterial({color:0x999999}));

let cube=new THREE.Object3D();
cube.add(line);

cube.position.set((x-L/2)*spacing,(y-W/2)*spacing,(z-H/2)*spacing);

let sides=0;
if(x==0||x==L-1) sides++;
if(y==0||y==W-1) sides++;
if(z==0||z==H-1) sides++;

cube.userData.sides=sides;
cube.userData.line=line;

scene.add(cube);
cubes.push(cube);

}}}

function animate(){
requestAnimationFrame(animate);
renderer.render(scene,camera);
}
animate();

function resetColors(){
cubes.forEach(c=>c.userData.line.material.color.set(0x999999));
document.getElementById("info").innerHTML="Reset";
document.getElementById("bars").innerHTML="";
}

function highlight(type){
cubes.forEach(c=>{
if(c.userData.sides===type){
if(type==1)c.userData.line.material.color.set(0x3b82f6);
if(type==2)c.userData.line.material.color.set(0xfacc15);
if(type==3)c.userData.line.material.color.set(0xef4444);
}else c.userData.line.material.color.set(0xdddddd);
});
updateBars(type);
}

function updateBars(type){
let bars=document.getElementById("bars");
let info=document.getElementById("info");
bars.innerHTML="";
if(type==1){
info.innerHTML="Face cubes → use area";
bars.innerHTML=`<div class="bar blue">20 × 6</div>`;
}
if(type==2){
info.innerHTML="Edge cubes → minus 2";
bars.innerHTML=`<div class="bar yellow">(20−2), (6−2), (15−2)</div>`;
}
if(type==3){
info.innerHTML="Corner cubes";
bars.innerHTML=`<div class="bar red">8 corners</div>`;
}
}

function zoomIn(){camera.position.multiplyScalar(0.8);}
function zoomOut(){camera.position.multiplyScalar(1.2);}
function rotateLeft(){scene.rotation.y += 0.2;}
function rotateRight(){scene.rotation.y -= 0.2;}

</script>
</body>
</html>
