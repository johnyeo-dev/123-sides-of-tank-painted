<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cube Teaching Tool (Final)</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { margin:0; font-family:Arial; background:#f8fafc; color:#111;}

.tabs { display:flex; background:#e2e8f0; }
.tab { padding:12px 20px; cursor:pointer; font-weight:bold;}
.active { background:white; border-bottom:3px solid #3b82f6;}

.container { display:flex; flex-direction:column; height:calc(100vh - 50px);}
#top { height:55%; position:relative; background:white;}
#bottom { height:45%; padding:20px; background:#eef2ff;}

.controls { position:absolute; top:10px; left:10px; z-index:10;}
button { margin:5px; padding:10px; border:none; border-radius:6px; cursor:pointer; font-weight:bold;}
.b1 {background:#3b82f6; color:white;}
.b2 {background:#facc15;}
.b3 {background:#ef4444; color:white;}
.b4 {background:#94a3b8;}

.controls2 {position:absolute; top:10px; right:10px;}

.tooltip {
  position:absolute; padding:6px 10px; background:#111; color:white;
  border-radius:6px; font-size:12px; pointer-events:none; display:none;
}

.overlayLabel{
  position:absolute;
  background:#111;
  color:white;
  padding:4px 8px;
  border-radius:6px;
  font-size:12px;
}
</style>
</head>
<body>

<div class="tabs">
<div class="tab active" onclick="switchTab(1)">Concept</div>
<div class="tab" onclick="switchTab(2)">Application</div>
</div>

<div class="container">
<div id="top">

<div class="controls">
<button class="b1" onclick="highlight(1)">1 side</button>
<button class="b2" onclick="highlight(2)">2 sides</button>
<button class="b3" onclick="highlight(3)">3 sides</button>
<button class="b4" onclick="resetColors()">Reset</button>
</div>

<div class="controls2">
<button onclick="zoomIn()">+</button>
<button onclick="zoomOut()">−</button>
<button onclick="rotateLeft()">⟲</button>
<button onclick="rotateRight()">⟳</button>
</div>

<div id="tooltip" class="tooltip"></div>
<div id="overlay"></div>

</div>

<div id="bottom">
<h3 id="title">Concept</h3>
<div id="content">
Click a button to explore.
</div>
</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.134/examples/js/controls/OrbitControls.js"></script>

<script>

let mode = "concept";

function switchTab(n){
  mode = n===1 ? "concept" : "application";

  document.querySelectorAll(".tab").forEach((t,i)=>{
    t.classList.toggle("active", i===n-1);
  });

  if(mode==="concept"){
    document.getElementById("title").innerHTML="Concept";
    document.getElementById("content").innerHTML="Click buttons to explore painted sides.";
    resetColors();
    clearOverlay();
  } else {
    document.getElementById("title").innerHTML="Application";
    document.getElementById("content").innerHTML=
    "2 faces painted → edges. We group them into strips.";
    runApplication();
  }
}

// ===== SCENE (UNCHANGED CORE) =====
let scene=new THREE.Scene();
scene.background=new THREE.Color(0xffffff);

let camera=new THREE.PerspectiveCamera(75,window.innerWidth/(window.innerHeight*0.55),0.1,1000);
let renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight*0.55);
document.getElementById("top").appendChild(renderer.domElement);

let controls=new THREE.OrbitControls(camera,renderer.domElement);
camera.position.set(10,10,10);

let light1=new THREE.AmbientLight(0xffffff,0.8);
scene.add(light1);
let light2=new THREE.DirectionalLight(0xffffff,0.6);
light2.position.set(5,10,7);
scene.add(light2);

let cubes=[];
let L=6,W=5,H=4,spacing=1.2;

for(let x=0;x<L;x++){
for(let y=0;y<W;y++){
for(let z=0;z<H;z++){

let geo=new THREE.BoxGeometry(1,1,1);
let mat=new THREE.MeshStandardMaterial({color:0xd1d5db});
let cube=new THREE.Mesh(geo,mat);

// subtle edges
let edges=new THREE.EdgesGeometry(geo);
let line=new THREE.LineSegments(edges,new THREE.LineBasicMaterial({color:0x888888}));
cube.add(line);

cube.position.set((x-L/2)*spacing,(y-W/2)*spacing,(z-H/2)*spacing);

let sides=0;
if(x==0||x==L-1) sides++;
if(y==0||y==W-1) sides++;
if(z==0||z==H-1) sides++;

cube.userData.sides=sides;

scene.add(cube);
cubes.push(cube);

}}}

// ===== TOOLTIP =====
let raycaster=new THREE.Raycaster();
let mouse=new THREE.Vector2();
let tooltip=document.getElementById("tooltip");

window.addEventListener("mousemove",(e)=>{
mouse.x=(e.clientX/window.innerWidth)*2-1;
mouse.y=-(e.clientY/(window.innerHeight*0.55))*2+1;

raycaster.setFromCamera(mouse,camera);
let intersects=raycaster.intersectObjects(cubes);

if(intersects.length>0){
let c=intersects[0].object;
tooltip.style.display="block";
tooltip.style.left=e.clientX+10+"px";
tooltip.style.top=e.clientY+10+"px";

let s=c.userData.sides;
tooltip.innerHTML=s+" side"+(s>1?"s":"")+" painted";
}else{
tooltip.style.display="none";
}
});

// ===== FUNCTIONS =====
function resetColors(){
cubes.forEach(c=>c.material.color.set(0xd1d5db));
}

function highlight(type){
cubes.forEach(c=>{
if(c.userData.sides===type){
if(type==1)c.material.color.set(0x3b82f6);
if(type==2)c.material.color.set(0xfacc15);
if(type==3)c.material.color.set(0xef4444);
}else c.material.color.set(0xe5e7eb);
});
}

// ===== APPLICATION (ADDED ONLY) =====
function clearOverlay(){
document.getElementById("overlay").innerHTML="";
}

function addLabel(text, x, y){
let div=document.createElement("div");
div.className="overlayLabel";
div.innerHTML=text;
div.style.left=x+"px";
div.style.top=y+"px";
document.getElementById("overlay").appendChild(div);
}

function runApplication(){
resetColors();
highlight(2); // edges

clearOverlay();

setTimeout(()=>{
addLabel("Top edges (4 strips)", 50, 80);
addLabel("Bottom edges (4 strips)", 50, 120);
addLabel("Vertical edges (4 strips)", 50, 160);
},500);

setTimeout(()=>{
document.getElementById("content").innerHTML=
"Total 12 strips → together = 68 cubes";
},2000);

}

// ===== CONTROLS =====
function zoomIn(){camera.position.multiplyScalar(0.8);}
function zoomOut(){camera.position.multiplyScalar(1.2);}
function rotateLeft(){scene.rotation.y += 0.2;}
function rotateRight(){scene.rotation.y -= 0.2;}

// ===== LOOP =====
function animate(){
requestAnimationFrame(animate);
renderer.render(scene,camera);
}
animate();

</script>
</body>
</html>
